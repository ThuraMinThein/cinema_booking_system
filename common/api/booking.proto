syntax = "proto3";

option go_package = "github.com/ThuraMinThein/commons/api";

package api.v1;
import "google/protobuf/empty.proto";

service BookingService { 
    rpc CreateBooking(CreateBookingRequest) returns (CreateBookingResponse) {}
    rpc GetBookings(GetBookingsRequest) returns (GetBookingsResponse) {}
}

message Booking {
    int32   id = 1;
    int32   seat_id = 2;
    int32   user_id = 3;
    int32   movie_id = 4;
    string  status = 5;
}

message CreateBookingRequest {
    int32 user_id = 1;
    int32 movie_id = 2;
    int32 seat_id = 3;
}

message CreateBookingResponse {
    string status = 1;
}

message GetBookingsRequest {
    int32 user_id = 1;
}

message GetBookingsResponse {
    repeated Booking bookings = 1;
}


service UserService {
    rpc CreateUser(CreateUserRequest) returns (CreateUserResponse) {}
    rpc LoginUser(LoginUserRequest) returns (LoginUserResponse) {}
}

message User {
    int32 id = 1;
    string name = 2;
    string email = 3;
    string password = 4;
}

message CreateUserRequest {
    string name = 1;
    string email = 2;
    string password = 3;
}

message CreateUserResponse {
    string status = 1;
}

message LoginUserRequest {
    string email = 1;
    string password = 2;
}

message LoginUserResponse {
    string status = 1;
    int32 user_id = 2;
}

service SeatsService {
    rpc SetSeats(google.protobuf.Empty) returns (SetSeatsResponse) {}
    rpc GetSeats(google.protobuf.Empty) returns (GetSeatsResponse) {}
}

message Seat {
    int32 id = 1;
    string name = 2;
    string row = 3;
    string column = 4;
    Status status = 5;
}

enum Status {
    STATUS_SEAT_UNSPECIFIED = 0;
    STATUS_AVAILABLE = 1;
    STATUS_HOLD = 2;
    STATUS_BOOKED = 3;
};

message SetSeatsResponse {
    string message = 1;
}

message GetSeatsResponse {
    repeated Seat seats = 1;
}