syntax = "proto3";

option go_package = "github.com/ThuraMinThein/commons/api";

package api.v1;

service BookingService { 
    rpc Create(CreateRequest) returns (CreateResponse) {}
    rpc HoldBooking(HoldBookingRequest) returns(HoldBookingResponse) {}
    rpc FindAll(FindAllRequest) returns (FindAllResponse) {}
    rpc IsSeatAvailable(IsSeatAvailableRequest) returns (IsSeatAvailableResponse) {}
    rpc Update(UpdateRequest) returns (UpdateResponse) {}
    rpc Cancel(CancelRequest) returns (CancelResponse) {}
}

message Booking {
    int64   id = 1;
    int64   seat_id = 2;
    string  seat_number = 3;
    string  user_id = 4;
    string  user_name = 5;
    int64   movie_id = 6;
    string  status = 7;
}

message CreateRequest {
    string user_id = 1;
    int64 movie_id = 2;
    repeated int64 seat_ids = 3;
}

message CreateResponse {
    string status = 1;
}

message HoldBookingRequest {
    string user_id = 1;
    int64 movie_id = 2;
    int64 seat_id = 3;
}

message HoldBookingResponse {
    string status = 1;
}

message FindAllRequest {
    string user_id = 1;
    int64 movie_id = 2;
}

message FindAllResponse {
    repeated Booking bookings = 1;
}

message IsSeatAvailableRequest {
    int64 seat_id = 1;
    int64 movie_id = 2;
}

message IsSeatAvailableResponse {
    bool available = 1;
    string message = 2;
}

message UpdateRequest {
    int64 booking_id = 1;
    int64 new_seat_id = 2;
}

message UpdateResponse {
    string status = 1;
}

message CancelRequest {
    string user_id = 1;
    int64 booking_id = 2;
}

message CancelResponse {
    int64 booking_id = 1;
}

service UserService {
    rpc CreateUser(CreateUserRequest) returns (CreateUserResponse) {}
    rpc LoginUser(LoginUserRequest) returns (LoginUserResponse) {}
    rpc GetUserById(GetUserByIdRequest) returns (GetUserByIdResponse) {}
}

message User {
    string id = 1;
    string name = 2;
    string email = 3;
    string password = 4;
}

message CreateUserRequest {
    string name = 1;
    string email = 2;
    string password = 3;
}

message CreateUserResponse {
    string user_id = 1;
    string status = 2;
}

message LoginUserRequest {
    string email = 1;
    string password = 2;
}

message LoginUserResponse {
    string status = 1;
    string user_id = 2;
}

message GetUserByIdRequest {
    string user_id = 1;
}

message GetUserByIdResponse {
    User user = 1;
}

service SeatsService {
    rpc SetSeats(SetSeatsRequest) returns (SetSeatsResponse) {}
    rpc GetSeats(GetSeatsRequest) returns (GetSeatsResponse) {}
    rpc GetOneSeat(GetOneSeatRequest) returns (GetOneSeatResponse) {}
    rpc DeleteSeat(DeleteSeatRequest) returns (DeleteSeatResponse) {}
}

message Seat {
    int64 id = 1;
    string name = 2;
    string row = 3;
    string column = 4;
    string status = 5;
}

enum Status {
    STATUS_SEAT_UNSPECIFIED = 0;
    STATUS_AVAILABLE = 1;
    STATUS_HOLD = 2;
    STATUS_BOOKED = 3;
};

message SetSeatsRequest {}

message SetSeatsResponse {
    string message = 1;
}

message GetSeatsRequest {
    int64 movie_id = 1;
}

message GetSeatsResponse {
    repeated Seat seats = 1;
}

message GetOneSeatRequest {
    int64 seat_id = 1;
}

message GetOneSeatResponse {
    Seat seat = 1;
}

message DeleteSeatRequest {
    int64 seat_id = 1;
}

message DeleteSeatResponse {
    string message = 1;
}