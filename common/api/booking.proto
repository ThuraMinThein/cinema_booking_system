syntax = "proto3";

option go_package = "github.com/ThuraMinThein/commons/api";

package api.v1;

service BookingService { 
    rpc Create(CreateRequest) returns (CreateResponse) {}
    rpc FindAll(FindAllRequest) returns (FindAllResponse) {}
    rpc IsSeatAvailable(IsSeatAvailableRequest) returns (IsSeatAvailableResponse) {}
    rpc Update(UpdateRequest) returns (UpdateResponse) {}
    rpc Cancel(CancelRequest) returns (CancelResponse) {}
}

message Booking {
    int32   id = 1;
    int32   seat_id = 2;
    int32   user_id = 3;
    int32   movie_id = 4;
    string  status = 5;
}

message CreateRequest {
    int32 user_id = 1;
    int32 movie_id = 2;
    int32 seat_id = 3;
}

message CreateResponse {
    string status = 1;
}

message FindAllRequest {
    int32 user_id = 1;
}

message FindAllResponse {
    repeated Booking bookings = 1;
}

message IsSeatAvailableRequest {
    int32 seat_id = 1;
    int32 movie_id = 2;
}

message IsSeatAvailableResponse {
    bool available = 1;
}

message UpdateRequest {
    int32 booking_id = 1;
    int32 new_seat_id = 2;
}

message UpdateResponse {
    string status = 1;
}

message CancelRequest {
    int32 booking_id = 1;
}

message CancelResponse {
    int64 booking_id = 1;
}

service UserService {
    rpc CreateUser(CreateUserRequest) returns (CreateUserResponse) {}
    rpc LoginUser(LoginUserRequest) returns (LoginUserResponse) {}
    rpc GetUserById(GetUserByIdRequest) returns (GetUserByIdResponse) {}
}

message User {
    string id = 1;
    string name = 2;
    string email = 3;
    string password = 4;
}

message CreateUserRequest {
    string name = 1;
    string email = 2;
    string password = 3;
}

message CreateUserResponse {
    string user_id = 1;
    string status = 2;
}

message LoginUserRequest {
    string email = 1;
    string password = 2;
}

message LoginUserResponse {
    string status = 1;
    string user_id = 2;
}

message GetUserByIdRequest {
    string user_id = 1;
}

message GetUserByIdResponse {
    User user = 1;
}

service SeatsService {
    rpc SetSeats(SetSeatsRequest) returns (SetSeatsResponse) {}
    rpc GetSeats(GetSeatsRequest) returns (GetSeatsResponse) {}
    rpc DeleteSeat(DeleteSeatRequest) returns (DeleteSeatResponse) {}
}

message Seat {
    int32 id = 1;
    string name = 2;
    string row = 3;
    string column = 4;
    Status status = 5;
}

enum Status {
    STATUS_SEAT_UNSPECIFIED = 0;
    STATUS_AVAILABLE = 1;
    STATUS_HOLD = 2;
    STATUS_BOOKED = 3;
};

message SetSeatsRequest {}

message GetSeatsRequest {}

message SetSeatsResponse {
    string message = 1;
}

message GetSeatsResponse {
    repeated Seat seats = 1;
}

message DeleteSeatRequest {
    int32 seat_id = 1;
}

message DeleteSeatResponse {
    string message = 1;
}