apiVersion: apps/v1
kind: Deployment
metadata:
  name: seats
  namespace: cinema-booking
  labels:
    app: seats
    version: "1.0"
spec:
  replicas: 2
  selector:
    matchLabels:
      app: seats
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: seats
    spec:
      terminationGracePeriodSeconds: 30
      containers:
        - name: seats
          image: ${DOCKERHUB_USERNAME}/cinema-seats:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 50053
              name: grpc
          envFrom:
            - configMapRef:
                name: seats-config
          env:
            - name: JWT_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: cinema-secrets
                  key: jwt-secret-key
            - name: DATABASE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: cinema-secrets
                  key: seats-db-password
          resources:
            requests:
              memory: "64Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "500m"
          livenessProbe:
            tcpSocket:
              port: 50053
            initialDelaySeconds: 15
            periodSeconds: 20
            failureThreshold: 3
          readinessProbe:
            tcpSocket:
              port: 50053
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 3
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
      securityContext:
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
