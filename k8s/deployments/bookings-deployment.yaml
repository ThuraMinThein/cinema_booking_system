apiVersion: apps/v1
kind: Deployment
metadata:
  name: bookings
  namespace: cinema-booking
  labels:
    app: bookings
    version: "1.0"
spec:
  replicas: 2
  selector:
    matchLabels:
      app: bookings
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: bookings
    spec:
      terminationGracePeriodSeconds: 30
      containers:
        - name: bookings
          image: ${DOCKERHUB_USERNAME}/cinema-bookings:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 50052
              name: grpc
          envFrom:
            - configMapRef:
                name: bookings-config
          env:
            - name: JWT_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: cinema-secrets
                  key: jwt-secret-key
            - name: DATABASE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: cinema-secrets
                  key: bookings-db-password
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: cinema-secrets
                  key: redis-password
          resources:
            requests:
              memory: "64Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "500m"
          livenessProbe:
            tcpSocket:
              port: 50052
            initialDelaySeconds: 15
            periodSeconds: 20
            failureThreshold: 3
          readinessProbe:
            tcpSocket:
              port: 50052
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 3
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
      securityContext:
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
