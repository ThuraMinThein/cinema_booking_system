# HPA for Bookings — scales on CPU utilisation
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: bookings-hpa
  namespace: cinema-booking
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: bookings
  minReplicas: 2
  maxReplicas: 8
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
