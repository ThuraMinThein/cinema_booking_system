# Seats — ClusterIP Service (internal gRPC traffic only)
apiVersion: v1
kind: Service
metadata:
  name: seats-svc
  namespace: cinema-booking
  labels:
    app: seats
spec:
  type: ClusterIP
  selector:
    app: seats
  ports:
    - name: grpc
      port: 50053
      targetPort: 50053
      protocol: TCP
