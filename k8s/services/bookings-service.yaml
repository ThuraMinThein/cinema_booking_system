# Bookings — ClusterIP Service (internal gRPC traffic only)
apiVersion: v1
kind: Service
metadata:
  name: bookings-svc
  namespace: cinema-booking
  labels:
    app: bookings
spec:
  type: ClusterIP
  selector:
    app: bookings
  ports:
    - name: grpc
      port: 50052
      targetPort: 50052
      protocol: TCP
