name: CD — Production Deploy

on:
  push:
    branches: [main]
  # Also triggerable via a version tag
  # tags:
  #   - "v*.*.*"

env:
  GO_VERSION: "1.25"
  REGISTRY: docker.io
  IMAGE_PREFIX: ${{ secrets.DOCKERHUB_USERNAME }}/cinema

jobs:
  # ──────────────────────────────────────────────────────────────────
  # Build & push all service images tagged :latest and :<sha>
  # ──────────────────────────────────────────────────────────────────
  build-and-push:
    name: Build & Push — ${{ matrix.service }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - service: gateway
            dockerfile: gateway/Dockerfile
          - service: bookings
            dockerfile: bookings/Dockerfile
          - service: users
            dockerfile: users/Dockerfile
          - service: seats
            dockerfile: seats/Dockerfile
    outputs:
      image-tag: ${{ steps.meta.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_PREFIX }}-${{ matrix.service }}
          tags: |
            type=raw,value=latest
            type=sha,prefix=,format=short
            # Uncomment for semver tagging from git tags:
            # type=semver,pattern={{version}}
            # type=semver,pattern={{major}}.{{minor}}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ──────────────────────────────────────────────────────────────────
  # Deploy to production Kubernetes cluster
  # ──────────────────────────────────────────────────────────────────
  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: build-and-push
    environment: production          # requires manual approval in GitHub Environments
    steps:
      - uses: actions/checkout@v4

      - name: Set up kubectl
        uses: azure/setup-kubectl@v4

      - name: Configure kubeconfig
        run: |
          mkdir -p $HOME/.kube
          echo "${{ secrets.KUBECONFIG_PROD }}" | base64 -d > $HOME/.kube/config
          chmod 600 $HOME/.kube/config

      - name: Apply K8s manifests (configmaps, services, ingress)
        run: |
          kubectl apply -f k8s/namespace.yaml
          kubectl apply -f k8s/configmaps/ -n cinema-booking
          kubectl apply -f k8s/services/ -n cinema-booking
          kubectl apply -f k8s/hpa/ -n cinema-booking
          kubectl apply -f k8s/ingress/ -n cinema-booking

      - name: Update image tags in deployments
        run: |
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)

          for SERVICE in gateway bookings users seats; do
            kubectl set image deployment/${SERVICE} \
              ${SERVICE}=${{ secrets.DOCKERHUB_USERNAME }}/cinema-${SERVICE}:${SHORT_SHA} \
              -n cinema-booking
          done

      - name: Wait for rollout
        run: |
          for DEPLOYMENT in gateway bookings users seats; do
            kubectl rollout status deployment/${DEPLOYMENT} -n cinema-booking --timeout=180s
          done

      - name: Smoke test — gateway health
        run: |
          kubectl port-forward svc/gateway-svc 8080:80 -n cinema-booking &
          sleep 5
          curl --fail http://localhost:8080/health || (echo "Health check failed!" && exit 1)

      - name: Notify on failure
        if: failure()
        run: |
          echo "Production deployment failed for SHA ${{ github.sha }}!"
          # Add webhook/Slack notification here if needed
