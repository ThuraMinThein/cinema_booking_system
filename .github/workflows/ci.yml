name: CI — Build, Lint & Test

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main, develop]

env:
  GO_VERSION: "1.25"

jobs:
  # ──────────────────────────────────────────────────────────────────
  # Lint all services with golangci-lint
  # ──────────────────────────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [gateway, bookings, users, seats]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: ${{ matrix.service }}/go.sum

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest
          working-directory: ${{ matrix.service }}

  # ──────────────────────────────────────────────────────────────────
  # Test all services
  # ──────────────────────────────────────────────────────────────────
  test:
    name: Test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [gateway, bookings, users, seats]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: ${{ matrix.service }}/go.sum

      - name: Run tests
        working-directory: ${{ matrix.service }}
        run: go test -v -race -coverprofile=coverage.out ./...

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-${{ matrix.service }}
          path: ${{ matrix.service }}/coverage.out
          retention-days: 7

  # ──────────────────────────────────────────────────────────────────
  # Validate Dockerfiles build successfully (no push)
  # ──────────────────────────────────────────────────────────────────
  build:
    name: Docker Build Validation
    runs-on: ubuntu-latest
    needs: [lint, test]
    strategy:
      matrix:
        include:
          - service: gateway
            dockerfile: gateway/Dockerfile
          - service: bookings
            dockerfile: bookings/Dockerfile
          - service: users
            dockerfile: users/Dockerfile
          - service: seats
            dockerfile: seats/Dockerfile
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image (no push)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: false
          tags: cinema-${{ matrix.service }}:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
